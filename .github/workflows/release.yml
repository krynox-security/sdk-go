name: Release

# Go modules are consumed straight from the git tag (no registry). On a version tag this validates
# the module and cuts a GitHub release so `go get <module>@vX.Y.Z` resolves. No secrets needed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "stable"
      - run: go build ./... && go vet ./... && go test ./...
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
